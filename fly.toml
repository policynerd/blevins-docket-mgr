# fly.toml app configuration file generated for beg-docket-manager on 2026-06-21T06:24:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'beg-docket-manager'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DOCKET_DB = '/data/docket.db'
  PORT = '3000'

[[mounts]]
  source = 'docket_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
