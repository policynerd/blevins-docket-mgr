name: Fly Deploy

# Deploys the app to Fly.io on every push to main. Requires a repository
# secret FLY_API_TOKEN (create with: `fly tokens create deploy`).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Module load smoke test
        run: >
          node --experimental-sqlite --no-warnings -e
          "require('./src/repo');require('./src/views/pages');require('./src/views/admin');require('./src/views/org');require('./src/views/minutes');console.log('modules OK')"

  deploy:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
